version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: contrast_shower_db
    environment:
      POSTGRES_DB: contrast_shower
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contrast_shower_backend
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/contrast_shower"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
